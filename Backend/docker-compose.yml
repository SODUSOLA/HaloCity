services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: halocity
    ports:
      - "5432:5432"
    volumes:
      - halocity_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - halocity_redis:/data

volumes:
  halocity_postgres:
  halocity_redis:
